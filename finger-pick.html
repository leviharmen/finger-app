<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finger Pick" />
  <title>Finger Pick</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0d0d1a;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* MODE SCREEN */
    #mode-screen {
      position: fixed;
      inset: 0;
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 2rem 1.5rem;
      transition: opacity 0.4s;
    }
    #mode-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #mode-title {
      color: rgba(255,255,255,0.9);
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }
    #mode-sub {
      color: rgba(255,255,255,0.3);
      font-size: 14px;
      margin-bottom: 40px;
    }
    .mode-card {
      width: 100%;
      max-width: 320px;
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px 22px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .mode-card:active {
      transform: scale(0.97);
      background: rgba(255,255,255,0.09);
    }
    .mode-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }
    .mode-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .mode-name {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
    }
    .mode-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      line-height: 1.5;
      padding-left: 24px;
    }

    /* GAME SCREEN */
    #app {
      width: 100vw;
      height: 100vh;
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }
    #trail-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    #finger-area {
      position: absolute;
      inset: 0;
      z-index: 2;
    }
    #instruction {
      color: rgba(255,255,255,0.55);
      font-size: 18px;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      padding: 0 2rem;
      line-height: 1.8;
      transition: opacity 0.4s;
      position: relative;
    }
    #instruction span {
      display: block;
      font-size: 14px;
      color: rgba(255,255,255,0.28);
    }
    .dot {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: none;
      transition: opacity 0.5s, transform 0.25s;
      z-index: 3;
    }
    .dot.highlighted {
      transform: translate(-50%, -50%) scale(1.45);
      box-shadow: 0 0 0 10px rgba(255,255,255,0.18), 0 0 0 22px rgba(255,255,255,0.06);
    }
    .dot.eliminated {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.3);
      transition: opacity 0.5s, transform 0.5s;
    }
    .dot.loser-pulse {
      animation: loserpulse 0.6s ease-in-out infinite alternate;
    }
    @keyframes loserpulse {
      from { transform: translate(-50%, -50%) scale(1.25); box-shadow: 0 0 0 8px rgba(255,255,255,0.12); }
      to   { transform: translate(-50%, -50%) scale(1.5);  box-shadow: 0 0 0 16px rgba(255,255,255,0.05); }
    }
    #status {
      position: absolute;
      bottom: 48px;
      left: 0; right: 0;
      text-align: center;
      color: rgba(255,255,255,0.38);
      font-size: 14px;
      pointer-events: none;
      z-index: 10;
      letter-spacing: 0.04em;
    }
    #counter {
      position: absolute;
      top: 24px; right: 24px;
      color: rgba(255,255,255,0.28);
      font-size: 14px;
      z-index: 10;
      pointer-events: none;
    }
    #back-btn {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 20;
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }
    #back-btn:active { background: rgba(255,255,255,0.13); }
    #mode-badge {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.2);
      font-size: 12px;
      z-index: 10;
      pointer-events: none;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<!-- MODE SELECTION SCREEN -->
<div id="mode-screen">
  <p id="mode-title">Finger Pick</p>
  <p id="mode-sub">Choose your mode</p>

  <div class="mode-card" data-mode="1">
    <div class="mode-card-header">
      <div class="mode-dot" style="background:#16c79a"></div>
      <span class="mode-name">Mode 1</span>
    </div>
  </div>

  <div class="mode-card" data-mode="2">
    <div class="mode-card-header">
      <div class="mode-dot" style="background:#e94560"></div>
      <span class="mode-name">Mode 2</span>
    </div>
  </div>

  <div class="mode-card" data-mode="3">
    <div class="mode-card-header">
      <div class="mode-dot" style="background:#7b2fff"></div>
      <span class="mode-name">Mode 3</span>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="app">
  <canvas id="trail-canvas"></canvas>
  <div id="finger-area"></div>
  <button id="back-btn">&#8592; Modes</button>
  <div id="mode-badge"></div>
  <div id="counter"></div>
  <p id="instruction">Place your fingers<br><span>Everyone put a finger on the screen</span></p>
  <div id="status"></div>
</div>

<script>
const COLORS = ['#e94560','#7b2fff','#16c79a','#e8a838','#1089ff','#e84393','#ff6b35','#00c9a7'];
const MODE_NAMES = { 1: 'Mode 1', 2: 'Mode 2', 3: 'Mode 3' };

const modeScreen  = document.getElementById('mode-screen');
const app         = document.getElementById('app');
const area        = document.getElementById('finger-area');
const instruction = document.getElementById('instruction');
const status      = document.getElementById('status');
const counter     = document.getElementById('counter');
const backBtn     = document.getElementById('back-btn');
const modeBadge   = document.getElementById('mode-badge');
const canvas      = document.getElementById('trail-canvas');
const ctx         = canvas.getContext('2d');

const BG_BASE  = [13, 13, 26];
const BG_LIGHT = [28, 28, 50];
const BG_DARK  = [6,  6,  12];

let currentMode   = 0;
let fingers       = [];
let lastId        = null;
let autoPickTimer = null;
let cancelTimer   = null;
let bgFlickerInt  = null;
let resetTimer    = null;
let picking       = false;
let showingResult = false;
let trailParticles = [];
let trailActive   = true;

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function lerp(a, b, t) { return Math.round(a + (b - a) * t); }
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function setAppBg(r, g, b) { app.style.background = 'rgb('+r+','+g+','+b+')'; }
function stopBgFlicker() {
  clearInterval(bgFlickerInt); bgFlickerInt = null;
  app.style.transition = 'background 0.5s';
  setAppBg(...BG_BASE);
}
function startBgFlicker() {
  app.style.transition = 'background 0.2s';
  bgFlickerInt = setInterval(() => {
    const shift = Math.random() < 0.5 ? BG_LIGHT : BG_DARK;
    const t = Math.random() * 0.3;
    setAppBg(lerp(BG_BASE[0],shift[0],t), lerp(BG_BASE[1],shift[1],t), lerp(BG_BASE[2],shift[2],t));
  }, 200);
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); trailParticles = []; }

function addTrailPoint(x, y, color) {
  if (!trailActive || picking) return;
  const [r, g, b] = hexToRgb(color);
  for (let i = 0; i < 4; i++) {
    trailParticles.push({
      x: x + (Math.random() - 0.5) * 10,
      y: y + (Math.random() - 0.5) * 10,
      r: Math.random() * 5 + 2,
      cr: r, cg: g, cb: b,
      life: 0.6 + Math.random() * 0.4,
      decay: 0.018 + Math.random() * 0.012
    });
  }
}

function animLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  trailParticles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba('+p.cr+','+p.cg+','+p.cb+','+p.life.toFixed(2)+')';
    ctx.fill();
    p.life -= p.decay;
  });
  trailParticles = trailParticles.filter(p => p.life > 0);
  requestAnimationFrame(animLoop);
}
animLoop();

function getSafeId() {
  if (currentMode === 1) return null;
  if (currentMode === 2) return lastId;
  if (currentMode === 3) {
    let stillest = fingers[0];
    fingers.forEach(f => { if (f.totalMovement < stillest.totalMovement) stillest = f; });
    return stillest.id;
  }
  return null;
}

function fullReset() {
  clearTimeout(autoPickTimer);
  clearTimeout(cancelTimer);
  clearTimeout(resetTimer);
  stopBgFlicker();
  fingers.forEach(f => f.dot.remove());
  fingers = [];
  lastId = null;
  picking = false;
  showingResult = false;
  trailActive = true;
  instruction.style.display = 'block';
  instruction.style.opacity = '1';
  status.textContent = '';
  counter.textContent = '';
  clearCanvas();
}

function showModeScreen() {
  fullReset();
  modeScreen.classList.remove('hidden');
}

function startMode(mode) {
  currentMode = mode;
  modeBadge.textContent = MODE_NAMES[mode].toUpperCase();
  modeScreen.classList.add('hidden');
}

document.querySelectorAll('.mode-card').forEach(card => {
  card.addEventListener('click', () => startMode(parseInt(card.dataset.mode)));
  card.addEventListener('touchend', e => {
    e.preventDefault();
    startMode(parseInt(card.dataset.mode));
  });
});

backBtn.addEventListener('click', showModeScreen);
backBtn.addEventListener('touchend', e => { e.preventDefault(); showModeScreen(); });

function scheduleAutoPick() {
  clearTimeout(autoPickTimer);
  if (fingers.length >= 2) {
    autoPickTimer = setTimeout(() => {
      trailActive = false;
      const animDuration = 3000 + Math.random() * 4000;
      doPick(animDuration);
    }, 3000);
  }
}

function updateUI() {
  const n = fingers.length;
  if (n === 0) {
    instruction.style.display = 'block';
    instruction.style.opacity = '1';
    counter.textContent = '';
  } else {
    instruction.style.opacity = '0';
    setTimeout(() => { if (fingers.length > 0) instruction.style.display = 'none'; }, 400);
    counter.textContent = n + (n === 1 ? ' finger' : ' fingers');
  }
}

function addFinger(x, y, id) {
  if (picking) return;
  if (fingers.find(f => f.id === id)) return;
  clearTimeout(cancelTimer);

  const idx   = fingers.length;
  const color = COLORS[idx % COLORS.length];
  const dot   = document.createElement('div');
  dot.className = 'dot';
  dot.style.left = x + 'px';
  dot.style.top  = y + 'px';
  dot.style.background = color;
  area.appendChild(dot);
  fingers.push({id, x, y, index: idx + 1, color, dot, totalMovement: 0});
  lastId = id;

  if (fingers.length >= 2) {
    status.textContent = '';
    scheduleAutoPick();
  } else {
    status.textContent = 'Need at least 2 fingers';
  }
  updateUI();
}

function moveFinger(id, x, y) {
  if (picking) return;
  const f = fingers.find(f => f.id === id);
  if (!f) return;
  const dx = x - f.x, dy = y - f.y;
  f.totalMovement += Math.sqrt(dx*dx + dy*dy);
  f.x = x; f.y = y;
  f.dot.style.left = x + 'px';
  f.dot.style.top  = y + 'px';
  addTrailPoint(x, y, f.color);
}

function removeFinger(id) {
  if (picking) return;
  const f = fingers.find(f => f.id === id);
  if (!f) return;
  f.dot.remove();
  fingers = fingers.filter(f => f.id !== id);
  fingers.forEach((f, i) => f.index = i + 1);
  lastId = fingers.length ? fingers[fingers.length - 1].id : null;
  clearTimeout(autoPickTimer);

  if (fingers.length === 0) {
    status.textContent = '';
    cancelTimer = setTimeout(() => {
      if (fingers.length === 0 && !picking && !showingResult) fullReset();
    }, 3000);
  } else if (fingers.length === 1) {
    status.textContent = 'Need at least 2 fingers';
  }
  updateUI();
}

function doPick(animDuration) {
  clearTimeout(autoPickTimer);
  if (fingers.length < 2 || picking) return;
  picking = true;
  status.textContent = '';

  const safeId   = getSafeId();
  const eligible = safeId ? fingers.filter(f => f.id !== safeId) : fingers;
  const loser    = eligible[Math.floor(Math.random() * eligible.length)];

  const startInterval = 280, endInterval = 700;
  let elapsed = 0, currentHighlight = -1;

  startBgFlicker();

  function easeInterval(t) {
    const p = t / animDuration;
    return startInterval + (endInterval - startInterval) * (p * p);
  }
  function highlight(idx) {
    fingers.forEach((f, i) => {
      f.dot.classList.remove('highlighted');
      if (i === idx) f.dot.classList.add('highlighted');
    });
  }
  function step() {
    const interval = easeInterval(elapsed);
    elapsed += interval;
    if (elapsed < animDuration) {
      let next;
      do { next = Math.floor(Math.random() * fingers.length); }
      while (next === currentHighlight && fingers.length > 1);
      currentHighlight = next;
      highlight(currentHighlight);
      setTimeout(step, interval);
    } else {
      const loserIdx = fingers.findIndex(f => f.id === loser.id);
      highlight(loserIdx);
      stopBgFlicker();
      setTimeout(() => {
        fingers.forEach(f => {
          f.dot.classList.remove('highlighted');
          if (f.id !== loser.id) f.dot.classList.add('eliminated');
          else f.dot.classList.add('loser-pulse');
        });
        setTimeout(() => {
          showingResult = true;
          status.textContent = 'Place a finger to play again';
          resetTimer = setTimeout(() => { if (showingResult) fullReset(); }, 8000);
        }, 600);
      }, 400);
    }
  }
  step();
}

area.addEventListener('touchstart', e => {
  e.preventDefault();
  if (showingResult) { fullReset(); }
  if (picking) return;
  const rect = area.getBoundingClientRect();
  Array.from(e.changedTouches).forEach(t => {
    addFinger(t.clientX - rect.left, t.clientY - rect.top, 'touch_' + t.identifier);
  });
}, {passive: false});

area.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = area.getBoundingClientRect();
  Array.from(e.changedTouches).forEach(t => {
    moveFinger('touch_' + t.identifier, t.clientX - rect.left, t.clientY - rect.top);
  });
}, {passive: false});

area.addEventListener('touchend', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => removeFinger('touch_' + t.identifier));
}, {passive: false});
</script>
</body>
</html>
